<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Snippets</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-dim: #1f3a5f;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --tag-bg: #21262d;
      --sidebar-w: 320px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      color: var(--text);
    }

    #search {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color .15s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text-muted); }

    #category-filter {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }
    #category-filter:focus { border-color: var(--accent); }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .sidebar-meta {
      padding: 8px 14px;
      font-size: 0.75rem;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #results {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }

    .result-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .result-item:hover { background: var(--tag-bg); }
    .result-item.active { background: var(--accent-dim); border-left: 3px solid var(--accent); }

    .tag {
      display: inline-block;
      font-size: 0.68rem;
      color: var(--text-muted);
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      margin-bottom: 4px;
      text-transform: lowercase;
    }

    .result-title {
      display: block;
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.3;
    }

    /* ── Detail panel ── */
    #detail {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #detail.empty::after {
      content: 'Select a snippet';
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .detail-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
    }

    #detail-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    #detail-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: lowercase;
    }

    #detail-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* ── Markdown styles ── */
    #detail-content h1,
    #detail-content h2,
    #detail-content h3 {
      color: var(--text);
      margin: 1.2em 0 0.4em;
      font-weight: 600;
    }
    #detail-content h1 { font-size: 1.2rem; }
    #detail-content h2 { font-size: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    #detail-content h3 { font-size: 0.9rem; }

    #detail-content p {
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.6;
      margin-bottom: 0.8em;
    }

    #detail-content a { color: var(--accent); }

    #detail-content pre {
      position: relative;
      margin: 0.8em 0;
      border-radius: 6px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    #detail-content pre code {
      display: block;
      padding: 14px 16px;
      font-size: 0.82rem;
      line-height: 1.5;
      overflow-x: auto;
    }

    #detail-content code:not(pre code) {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.82rem;
    }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 0.72rem;
      padding: 3px 8px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>✦ snippets</h1>
  <input id="search" type="search" placeholder="Search title, category, or content…" autofocus />
  <select id="category-filter">
    <option value="">All categories</option>
  </select>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-meta"><span id="count"></span></div>
    <ul id="results"></ul>
  </aside>

  <main id="detail" class="empty">
    <div class="detail-header">
      <div id="detail-title"></div>
      <div id="detail-meta"></div>
    </div>
    <div id="detail-content"></div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="snippets-data.js"></script>
<script src="search.js"></script>
</body>
</html>
